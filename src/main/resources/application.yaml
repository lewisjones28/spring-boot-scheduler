spring:
  application:
    name: Spring Boot Scheduler Application
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scheduler}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

scheduler:
  default-job-interval-ms: 30000 # Default time interval for job execution
  polling-interval-ms: 30000 # Time interval for polling the database for jobs
